name: Build VIDIOF Player
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    - name: Build play.exe
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cl.exe /O2 /W3 /MT /DUNICODE /D_UNICODE /utf-8 ^
          launcher/launcher.cpp ^
          user32.lib kernel32.lib gdi32.lib comdlg32.lib shell32.lib shlwapi.lib ^
          advapi32.lib comctl32.lib winmm.lib ole32.lib ^
          /link /SUBSYSTEM:WINDOWS /OUT:play.exe
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: play
        path: play.exe
