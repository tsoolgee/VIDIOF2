name: Build Player

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Build play.exe
      shell: cmd
      run: |
        cl.exe /O2 /W3 /MT /DUNICODE /D_UNICODE ^
          launcher\launcher.cpp ^
          user32.lib kernel32.lib comdlg32.lib ^
          /link /SUBSYSTEM:WINDOWS /OUT:play.exe

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: play
        path: play.exe
