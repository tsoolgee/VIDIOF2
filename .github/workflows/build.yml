name: Build play.exe

on:
  push:
    paths:
      - 'launcher/launcher.cpp'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile play.exe
        shell: cmd
        run: cl.exe /O2 /W3 /EHsc /DUNICODE /D_UNICODE launcher\launcher.cpp /Fe:play.exe /link shell32.lib shlwapi.lib comdlg32.lib user32.lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: play-exe
          path: play.exe
          retention-days: 30
